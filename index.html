<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura+ - Billetera Digital</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%237C3AED' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3Cpolygon points='50,10 55,25 72,25 60,35 65,50 50,40 35,50 40,35 28,25 45,25' fill='%2306B6D4'/%3E%3C/svg%3E">
    <style>
        body {
            background: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .hero-content {
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-in-out;
        }
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .feature-list {
            list-style: none;
            padding: 0;
            margin-bottom: 40px;
        }
        .feature-list li {
            font-size: 1.1rem;
            margin-bottom: 12px;
            opacity: 0.9;
        }
        .feature-list i {
            margin-right: 10px;
            color: #10B981;
        }
        .cta-button {
            background: #10B981;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .cta-button:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            color: white;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .hero-content p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="hero-content">
                    <div style="font-size: 4rem; margin-bottom: 20px;">
                        <i class="fas fa-wallet" style="color: #10B981;"></i>
                    </div>
                    <h1>Aura+</h1>
                    <p>Tu billetera digital segura y moderna</p>
                    
                    <ul class="feature-list">
                        <li><i class="fas fa-lock"></i> Seguridad en el navegador</li>
                        <li><i class="fas fa-mobile-alt"></i> Accesible desde cualquier dispositivo</li>
                        <li><i class="fas fa-exchange-alt"></i> Transferencias instantáneas</li>
                        <li><i class="fas fa-history"></i> Historial completo de movimientos</li>
                    </ul>

                    <a href="login.html" class="cta-button">
                        Ingresar a mi cuenta <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
