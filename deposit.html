<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura+ - Depositar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%237C3AED' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3Cpolygon points='50,10 55,25 72,25 60,35 65,50 50,40 35,50 40,35 28,25 45,25' fill='%2306B6D4'/%3E%3C/svg%3E">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a href="menu.html" class="navbar-brand">
                <i class="fas fa-wallet"></i> Aura+
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="deposit-container">
            <div class="card">
                <div class="card-header">
                    <h4><i class="fas fa-plus-circle"></i> Depositar Dinero</h4>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4 pb-3" style="border-bottom: 1px solid #e2e8f0;">
                        <small class="text-muted d-block mb-1">Saldo disponible</small>
                        <span id="saldoActualDisplay" class="fw-bold fs-4" style="color: #7C3AED;">$0</span>
                    </div>
                    <div id="alertMensaje" class="alert" style="display: none;"></div>

                    <form id="depositForm">
                        <div class="mb-4">
                            <label for="inputDeposito" class="form-label">Monto a depositar (CLP)</label>
                            <div class="input-group">
                                <span class="input-group-text" style="border-radius: 8px 0 0 8px;">$</span>
                                <input type="number" class="form-control" id="inputDeposito"
                                       placeholder="0" step="1" min="1" required>
                            </div>
                            <small class="text-muted d-block mt-2">Mínimo: $1 | Sin decimales</small>
                        </div>
                        <button type="submit" class="btn btn-deposit w-100">
                            <i class="fas fa-check"></i> Realizar depósito
                        </button>
                    </form>

                    <a href="menu.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Volver al Menú
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDepositModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-check-circle"></i> Confirmar Depósito</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <p class="mb-1 text-muted">Estás por depositar:</p>
                    <div class="fw-bold fs-2 text-success" id="confirmDepositAmount"></div>
                    <p class="text-muted mt-2 mb-0">¿Confirmas la operación?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" id="btnConfirmDeposit">
                        <i class="fas fa-check"></i> Sí, depositar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>

    <script>
        $(document).ready(function() {
            if (!AuraAuth.requireSesion()) return;

            let saldoActual = AuraStorage.getSaldo();
            $('#saldoActualDisplay').text(AuraUI.formatCLP(saldoActual));

            $('#inputDeposito').on('invalid', function() {
                if (this.validity.valueMissing) this.setCustomValidity('Por favor ingresa un monto');
                else if (this.validity.rangeUnderflow) this.setCustomValidity('El monto debe ser mayor a $0');
                else this.setCustomValidity('');
            }).on('input', function() { this.setCustomValidity(''); });

            let montoConfirmado = 0;

            $('#depositForm').submit(function(evento) {
                evento.preventDefault();
                const resultado = AuraValidators.validarMonto($('#inputDeposito').val().trim());
                if (!resultado.ok) {
                    AuraUI.mostrarError('#alertMensaje', resultado.error);
                    return;
                }
                montoConfirmado = resultado.monto;
                $('#confirmDepositAmount').text(AuraUI.formatCLP(montoConfirmado));
                new bootstrap.Modal(document.getElementById('confirmDepositModal')).show();
            });

            $('#btnConfirmDeposit').click(function() {
                const nuevoSaldo = saldoActual + montoConfirmado;
                AuraStorage.setSaldo(nuevoSaldo);
                AuraStorage.pushMovimiento({
                    tipo: 'Depósito',
                    descripcion: 'Depósito de fondos',
                    monto: montoConfirmado.toString(),
                    fecha: new Date().toLocaleDateString(AURA_CONFIG.LOCALE),
                    esIngreso: true
                });

                bootstrap.Modal.getInstance(document.getElementById('confirmDepositModal')).hide();

                saldoActual = nuevoSaldo;
                $('#saldoActualDisplay').text(AuraUI.formatCLP(saldoActual));
                AuraUI.mostrarExito('#alertMensaje', `¡Depósito exitoso! Nuevo saldo: ${AuraUI.formatCLP(saldoActual)}`);
                $('#inputDeposito').val('');
                montoConfirmado = 0;
            });
        });
    </script>
</body>
</html>
