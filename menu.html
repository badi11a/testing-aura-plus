<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura+ - Menú Principal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%237C3AED' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3Cpolygon points='50,10 55,25 72,25 60,35 65,50 50,40 35,50 40,35 28,25 45,25' fill='%2306B6D4'/%3E%3C/svg%3E">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <span class="navbar-brand">
                <i class="fas fa-wallet"></i> Aura+
            </span>
            <span class="navbar-text text-white ms-auto" id="usuarioDisplay"></span>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="saldo-card">
                    <h5>Tu Saldo Actual</h5>
                    <div class="saldo-amount" id="saldoDisplay">$0</div>
                </div>

                <div class="menu-buttons">
                    <a href="deposit.html" class="menu-btn">
                        <i class="fas fa-plus-circle"></i>
                        <span>Depositar</span>
                    </a>
                    <a href="sendmoney.html" class="menu-btn">
                        <i class="fas fa-paper-plane"></i>
                        <span>Enviar Dinero</span>
                    </a>
                    <a href="transactions.html" class="menu-btn">
                        <i class="fas fa-history"></i>
                        <span>Últimos Movimientos</span>
                    </a>
                </div>

                <div class="text-center">
                    <button id="btnLogout" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i>
                        Cerrar Sesión
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>

    <script>
        $(document).ready(function() {
            if (!AuraAuth.requireSesion()) return;

            $('#usuarioDisplay').text(AuraStorage.getUsuario());
            $('#saldoDisplay').text(AuraUI.formatCLP(AuraStorage.getSaldo()));

            $('#btnLogout').click(function() {
                AuraAuth.logout();
            });
        });
    </script>
</body>
</html>
