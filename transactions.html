<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura+ - Movimientos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%237C3AED' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3Cpolygon points='50,10 55,25 72,25 60,35 65,50 50,40 35,50 40,35 28,25 45,25' fill='%2306B6D4'/%3E%3C/svg%3E">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a href="menu.html" class="navbar-brand">
                <i class="fas fa-wallet"></i> Aura+
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="transactions-container">
            <div class="saldo-header">
                <h5>Saldo Actual</h5>
                <div class="saldo-amount" id="saldoDisplay">$0</div>
            </div>

            <div class="card mb-3">
                <div class="card-body p-3">
                    <div class="input-group">
                        <span class="input-group-text" style="border: 2px solid #e2e8f0; background: white;">
                            <i class="fas fa-search" style="color: #7C3AED;"></i>
                        </span>
                        <input type="text" class="form-control" id="searchTx" placeholder="Buscar movimientos...">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-history"></i> Últimos Movimientos</h5>
                </div>
                <div class="card-body p-4">
                    <div id="listaMovimientos"></div>
                </div>
            </div>

            <a href="menu.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Volver al Menú
            </a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>

    <script>
        $(document).ready(function() {
            if (!AuraAuth.requireSesion()) return;

            $('#saldoDisplay').text(AuraUI.formatCLP(AuraStorage.getSaldo()));

            const historial = AuraStorage.getHistorial();
            const $lista = $('#listaMovimientos');

            if (historial.length === 0) {
                const $estado = $('<div class="empty-state">');
                $estado.append($('<i class="fas fa-inbox">'));
                $estado.append($('<p>').text('No hay movimientos registrados aún'));
                $estado.append($('<small class="text-muted">').text('Realiza tu primer depósito o transferencia para verla aquí'));
                $lista.append($estado);
                return;
            }

            // H2: se restaura el filtro desde sessionStorage al volver a la página
            const filtroGuardado = sessionStorage.getItem('auraFiltroTx') || '';
            $('#searchTx').val(filtroGuardado);
            renderMovimientos(filtroGuardado ? filtrarLista(filtroGuardado) : historial);

            $('#searchTx').on('keyup', function() {
                const termino = $(this).val();
                sessionStorage.setItem('auraFiltroTx', termino); // H2: persiste al navegar
                renderMovimientos(filtrarLista(termino));
            });

            function filtrarLista(termino) {
                if (!termino) return historial;
                // D3: búsqueda sensible a mayúsculas — no se aplica toLowerCase
                return historial.filter(m =>
                    m.descripcion.includes(termino) || m.tipo.includes(termino)
                );
            }

            function renderMovimientos(lista) {
                $lista.empty();
                if (lista.length === 0) {
                    const $vacio = $('<div class="empty-state">');
                    $vacio.append($('<i class="fas fa-search">'));
                    $vacio.append($('<p>').text('No se encontraron movimientos'));
                    $lista.append($vacio);
                    return;
                }
                lista.forEach(function(movimiento) {
                    const esIngreso = movimiento.esIngreso === true;
                    const signo = esIngreso ? '+' : '-';
                    const claseColor = esIngreso ? 'amount-ingreso' : 'amount-egreso';
                    const icono = esIngreso ? 'fa-arrow-down' : 'fa-arrow-up';

                    const $item = $('<div class="transaction-item">');

                    const $info = $('<div class="transaction-info">');
                    const $h6 = $('<h6>').append($('<i class="fas ' + icono + '" style="margin-right: 8px;">'));
                    $h6.append(document.createTextNode(movimiento.tipo));
                    $info.append($h6);
                    $info.append($('<p>').text(movimiento.descripcion));
                    $info.append($('<small class="text-muted">').text(movimiento.fecha));
                    $info.append($('<small class="text-muted d-block">').text('Categoría: ' + movimiento.categoria));

                    const montoFormateado = AuraUI.formatCLP(parseInt(movimiento.monto));
                    const $monto = $('<div class="transaction-amount ' + claseColor + '">').text(signo + montoFormateado);

                    $item.append($info).append($monto);
                    $lista.append($item);
                });
            }
        });
    </script>
</body>
</html>
