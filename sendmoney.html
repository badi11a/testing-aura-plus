<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura+ - Enviar Dinero</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%237C3AED' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3Cpolygon points='50,10 55,25 72,25 60,35 65,50 50,40 35,50 40,35 28,25 45,25' fill='%2306B6D4'/%3E%3C/svg%3E">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a href="menu.html" class="navbar-brand">
                <i class="fas fa-wallet"></i> Aura+
            </a>
        </div>
    </nav>

    <div class="container">
        <div class="send-container">
            <div id="alertMensaje" class="alert" style="display: none;"></div>

            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-search"></i> Buscar Contacto</h5>
                </div>
                <div class="card-body">
                    <input type="text" class="form-control" id="searchInput" placeholder="Buscar por nombre...">
                </div>
            </div>

            <button class="btn-add-contact" data-bs-toggle="modal" data-bs-target="#addContactModal">
                <i class="fas fa-plus"></i> Agregar nuevo contacto
            </button>

            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-address-book"></i> Contactos (<span id="contactCount">0</span>)</h5>
                </div>
                <div class="card-body p-3">
                    <div id="contactList"></div>
                </div>
            </div>

            <a href="menu.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Volver al Menú
            </a>
        </div>
    </div>

    <!-- Modal: Agregar contacto -->
    <div class="modal fade" id="addContactModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-plus"></i> Nuevo Contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="addContactError" class="alert alert-danger" style="display: none;"></div>
                    <form id="addContactForm">
                        <div class="mb-3">
                            <label for="newContactName" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="newContactName" placeholder="Ej: Juan Pérez" required>
                        </div>
                        <div class="mb-3">
                            <label for="newContactRUT" class="form-label">RUT</label>
                            <input type="text" class="form-control" id="newContactRUT" placeholder="Ej: 12.345.678-9" required>
                        </div>
                        <div class="mb-3">
                            <label for="newContactBank" class="form-label">Banco</label>
                            <select class="form-control" id="newContactBank" required>
                                <option value="">Selecciona un banco</option>
                                <option value="Banco Estado">Banco Estado</option>
                                <option value="Banco de Chile">Banco de Chile</option>
                                <option value="Santander">Santander</option>
                                <option value="BCI">BCI</option>
                                <option value="Scotiabank">Scotiabank</option>
                                <option value="Itaú">Itaú</option>
                                <option value="Falabella">Falabella</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="newContactType" class="form-label">Tipo de Cuenta</label>
                            <select class="form-control" id="newContactType" required>
                                <option value="">Selecciona el tipo</option>
                                <option value="Cuenta Rut / Vista">Cuenta Rut / Vista</option>
                                <option value="Cuenta Corriente">Cuenta Corriente</option>
                                <option value="Cuenta de Ahorro">Cuenta de Ahorro</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="newContactNumber" class="form-label">Número de Cuenta</label>
                            <input type="text" class="form-control" id="newContactNumber" placeholder="Ej: 123456789" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-check"></i> Guardar contacto
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Transferencia -->
    <div class="modal fade" id="transferModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-exchange-alt"></i> Transferencia</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3">Enviando a: <strong id="transferContactName"></strong></p>
                    <div id="transferError" class="alert" style="display: none;"></div>
                    <form id="transferForm">
                        <div class="mb-4">
                            <label for="transferAmount" class="form-label">Monto a transferir (CLP)</label>
                            <div class="input-group">
                                <span class="input-group-text" style="border-radius: 8px 0 0 8px; border: 2px solid #e2e8f0; background: white;">$</span>
                                <input type="number" class="form-control" id="transferAmount"
                                       placeholder="0" step="1" min="1" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-check"></i> Confirmar transferencia
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>

    <script>
        let contactoSeleccionado = null;
        let saldoActual = 0;

        $(document).ready(function() {
            if (!AuraAuth.requireSesion()) return;

            inicializarContactos();
            saldoActual = AuraStorage.getSaldo();
            configurarEventos();
            actualizarListaContactos();
        });

        function inicializarContactos() {
            if (AuraStorage.getContactos().length > 0) return;
            AuraStorage.setContactos([
                { id: 1, nombre: 'Juan Pérez',      rut: '12.345.678-9', banco: 'Banco Estado',  tipo: 'Cuenta Corriente',  numero: '123456789' },
                { id: 2, nombre: 'María González',  rut: '9.876.543-2',  banco: 'Banco de Chile', tipo: 'Cuenta de Ahorro',  numero: '987654321' },
                { id: 3, nombre: 'Carlos Tapia',    rut: '15.111.222-3', banco: 'Santander',      tipo: 'Cuenta Rut / Vista', numero: '555666777' }
            ]);
        }

        function configurarEventos() {
            $('#searchInput').on('keyup', function() {
                actualizarListaContactos($(this).val().toLowerCase());
            });

            document.getElementById('addContactModal').addEventListener('show.bs.modal', function() {
                $('#addContactError').hide();
            });

            $('#addContactForm').submit(function(evento) {
                evento.preventDefault();
                agregarContacto();
            });

            $('#transferForm').submit(function(evento) {
                evento.preventDefault();
                realizarTransferencia();
            });

            $('#transferAmount').on('invalid', function() {
                if (this.validity.valueMissing) this.setCustomValidity('Por favor ingresa un monto');
                else if (this.validity.rangeUnderflow) this.setCustomValidity('El monto debe ser mayor a $0');
                else this.setCustomValidity('');
            }).on('input', function() { this.setCustomValidity(''); });

            ['#newContactName', '#newContactRUT', '#newContactNumber'].forEach(function(sel) {
                $(sel).on('invalid', function() {
                    this.setCustomValidity(this.validity.valueMissing ? 'Este campo es obligatorio' : '');
                }).on('input', function() { this.setCustomValidity(''); });
            });

            ['#newContactBank', '#newContactType'].forEach(function(sel) {
                $(sel).on('invalid', function() {
                    this.setCustomValidity(this.validity.valueMissing ? 'Selecciona una opción' : '');
                }).on('change', function() { this.setCustomValidity(''); });
            });

            // Delegación de eventos: evita onclick inline con datos de usuario
            $(document).on('click', '.btn-select', function() {
                seleccionarContacto(parseInt($(this).data('id'), 10));
            });

            $(document).on('click', '.btn-delete', function() {
                eliminarContacto(parseInt($(this).data('id'), 10));
            });
        }

        function actualizarListaContactos(filtro = '') {
            const contactos = AuraStorage.getContactos();
            const filtrados = contactos.filter(c => c.nombre.toLowerCase().includes(filtro));

            $('#contactCount').text(filtrados.length);
            const $lista = $('#contactList').empty();

            if (filtrados.length === 0) {
                const $vacio = $('<div class="no-contacts">');
                $vacio.append($('<i class="fas fa-inbox">'));
                $vacio.append($('<p>').text('No hay contactos que coincidan con la búsqueda'));
                $lista.append($vacio);
                return;
            }

            filtrados.forEach(contacto => {
                const $item = $('<div class="contact-item">');

                const $info = $('<div class="contact-info">');
                $info.append($('<strong>').text(contacto.nombre));
                $info.append($('<small>').text(`RUT: ${contacto.rut} | ${contacto.banco}`));
                $info.append($('<small class="d-block">').text(`${contacto.tipo} - ${contacto.numero}`));

                const $acciones = $('<div>');
                $acciones.append(
                    $('<button type="button" class="btn-select">').attr('data-id', contacto.id)
                        .html('<i class="fas fa-arrow-right"></i> Enviar')
                );
                $acciones.append(
                    $('<button type="button" class="btn-delete">').attr('data-id', contacto.id)
                        .html('<i class="fas fa-trash"></i>')
                );

                $item.append($info).append($acciones);
                $lista.append($item);
            });
        }

        function seleccionarContacto(id) {
            contactoSeleccionado = AuraStorage.getContactos().find(c => c.id === id) || null;
            if (!contactoSeleccionado) return;

            $('#transferContactName').text(contactoSeleccionado.nombre);
            $('#transferAmount').val('');
            $('#transferError').hide();
            new bootstrap.Modal(document.getElementById('transferModal')).show();
        }

        function realizarTransferencia() {
            const resultado = AuraValidators.validarMonto($('#transferAmount').val().trim());
            if (!resultado.ok) {
                AuraUI.mostrarError('#transferError', resultado.error);
                return;
            }

            const { monto } = resultado;
            if (monto > saldoActual) {
                AuraUI.mostrarError('#transferError', `Fondos insuficientes. Tu saldo disponible es ${AuraUI.formatCLP(saldoActual)}`);
                return;
            }

            const nuevoSaldo = saldoActual - monto;
            AuraStorage.setSaldo(nuevoSaldo);
            AuraStorage.pushMovimiento({
                tipo: 'Transferencia',
                descripcion: `Transferencia a ${contactoSeleccionado.nombre}`,
                monto: monto.toString(),
                fecha: new Date().toLocaleDateString(AURA_CONFIG.LOCALE),
                esIngreso: false
            });

            bootstrap.Modal.getInstance(document.getElementById('transferModal')).hide();

            saldoActual = nuevoSaldo;
            AuraUI.mostrarExito('#alertMensaje', `¡Transferencia exitosa a ${contactoSeleccionado.nombre}!`, 5000);
        }

        function agregarContacto() {
            const nombre  = $('#newContactName').val().trim();
            const rut     = $('#newContactRUT').val().trim();
            const banco   = $('#newContactBank').val();
            const tipo    = $('#newContactType').val();
            const numero  = $('#newContactNumber').val().trim();

            if (!nombre || !rut || !banco || !tipo || !numero) {
                AuraUI.mostrarError('#addContactError', 'Todos los campos son obligatorios');
                return;
            }
            if (!AuraValidators.validarNombre(nombre)) {
                AuraUI.mostrarError('#addContactError', 'El nombre solo puede contener letras y espacios');
                return;
            }
            if (!AuraValidators.validarRUT(rut)) {
                AuraUI.mostrarError('#addContactError', 'RUT inválido. Formato esperado: 12.345.678-9');
                return;
            }
            if (!AuraValidators.validarNumeroCuenta(numero)) {
                AuraUI.mostrarError('#addContactError', 'El número de cuenta solo puede contener dígitos');
                return;
            }

            const contactos = AuraStorage.getContactos();
            const rutLimpio = rut.replace(/\./g, '').replace(/-/g, '').toUpperCase();
            const duplicado = contactos.find(c => c.rut.replace(/\./g, '').replace(/-/g, '').toUpperCase() === rutLimpio);
            if (duplicado) {
                AuraUI.mostrarError('#addContactError', `Ya existe un contacto con ese RUT: "${duplicado.nombre}"`);
                return;
            }

            const nuevoId = Math.max(...contactos.map(c => c.id), 0) + 1;
            contactos.push({ id: nuevoId, nombre, rut, banco, tipo, numero });
            AuraStorage.setContactos(contactos);

            bootstrap.Modal.getInstance(document.getElementById('addContactModal')).hide();
            $('#addContactForm')[0].reset();
            actualizarListaContactos();
            AuraUI.mostrarExito('#alertMensaje', `Contacto "${nombre}" agregado exitosamente`, 5000);
        }

        function eliminarContacto(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este contacto?')) return;

            const contactos = AuraStorage.getContactos();
            const idx = contactos.findIndex(c => c.id === id);
            if (idx === -1) return;

            const nombreEliminado = contactos[idx].nombre;
            contactos.splice(idx, 1);
            AuraStorage.setContactos(contactos);
            actualizarListaContactos();
            AuraUI.mostrarExito('#alertMensaje', `Contacto "${nombreEliminado}" eliminado exitosamente`, 5000);
        }
    </script>
</body>
</html>
