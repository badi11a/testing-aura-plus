<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura+ - Inicio de Sesión</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%237C3AED' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='80' fill='white' text-anchor='middle' font-weight='bold'%3EA%3C/text%3E%3Cpolygon points='50,10 55,25 72,25 60,35 65,50 50,40 35,50 40,35 28,25 45,25' fill='%2306B6D4'/%3E%3C/svg%3E">
</head>
<body class="page-auth">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="login-container">
                    <div class="login-header">
                        <i class="fas fa-lock"></i>
                        <h2>Aura+</h2>
                        <p>Inicia sesión en tu cuenta</p>
                    </div>

                    <div id="alertMensaje" class="alert" style="display: none;"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="usuario@aura.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Iniciar sesión
                        </button>
                    </form>

                    <div class="back-link">
                        <a href="index.html"><i class="fas fa-arrow-left"></i> Volver</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/validators.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>

    <script>
        $(document).ready(function() {
            $('#email').on('invalid', function() {
                if (this.validity.valueMissing) this.setCustomValidity('Por favor ingresa tu email');
                else if (this.validity.typeMismatch) this.setCustomValidity('Ingresa un email válido (ej: usuario@correo.com)');
                else this.setCustomValidity('');
            }).on('input', function() { this.setCustomValidity(''); });

            $('#password').on('invalid', function() {
                if (this.validity.valueMissing) this.setCustomValidity('Por favor ingresa tu contraseña');
                else this.setCustomValidity('');
            }).on('input', function() { this.setCustomValidity(''); });

            $('#loginForm').submit(function(evento) {
                evento.preventDefault();
                const email = $('#email').val().trim();
                const password = $('#password').val();

                if (email === AURA_CONFIG.CREDENCIALES.email && password === AURA_CONFIG.CREDENCIALES.password) {
                    AuraStorage.setUsuario(email);
                    window.location.href = 'menu.html';
                } else {
                    AuraUI.mostrarError('#alertMensaje', 'Email o contraseña incorrectos', 5000);
                    $('#email').val('');
                    $('#password').val('');
                }
            });
        });
    </script>
</body>
</html>
